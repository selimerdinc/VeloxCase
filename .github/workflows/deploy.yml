name: VeloxCase Auto Deploy

on:
  push:
    branches:
      - main  # Hangi branch'e push atınca çalışmasını istiyorsanız

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Deploy to Server via SSH
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.SSH_HOST }}
          username: ${{ secrets.SSH_USERNAME }}
          key: ${{ secrets.SSH_KEY }}
          command_timeout: 30m
          script: |
            # Create Swap if not exists (Prevention for OOM on Free Tier)
            if [ ! -f /swapfile ]; then
              sudo fallocate -l 2G /swapfile || sudo dd if=/dev/zero of=/swapfile bs=1M count=2048
              sudo chmod 600 /swapfile
              sudo mkswap /swapfile
              sudo swapon /swapfile
              echo '/swapfile none swap sw 0 0' | sudo tee -a /etc/fstab
            fi
            
            cd /home/ubuntu/VeloxCase
            git remote set-url origin https://github.com/selimerdinc/VeloxCase.git
            git fetch --all
            git reset --hard origin/main
            chmod +x scripts/deploy.sh
            ./scripts/deploy.sh